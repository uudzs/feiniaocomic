<!DOCTYPE html>
<html lang="zh-CN">

<head>    
    <!-- meta -->
    {block name="seo"}
        <title>{$ConfRes.sitename|default=''}</title>
        <meta name="keywords" content="{$ConfRes.keywords|default=''}">
        <meta name="description" content="{$ConfRes.description|default=''}">
    {/block}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta http-equiv="Cache-Control" content="no-siteapp">
    <meta name="robots" content="index, follow">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{$ConfRes.sitename|default=''}">

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="{$ConfRes.favicon}">
    <link rel="icon" type="image/png" sizes="32x32" href="{$ConfRes.favicon}">

    <!-- Stylesheets --> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{:theme_asset('static/css/common.css')}">
    {:theme_styles()}

    <!-- Block CSS -->
    {block name="css"}{/block}
</head>

<body>
    <!-- header Block -->    
    {block name="header"}{/block}
    <!-- Main Block -->
    {block name="main"}{/block}
    <!-- footer Block -->
    {block name="footer"}{/block}

    <!-- 弹层组件 -->
    <div id="modalContainer"></div>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="{:theme_asset('static/js/common.js')}"></script>
    <!-- JS Block -->
    {block name="js"}{/block}
    {block name="script"}{/block}
</body>
</html>
