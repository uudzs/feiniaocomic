<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>哎呀！找不到页面了！</title>
    <style type="text/css">
        html,
        body,
        div,
        ul,
        ol,
        li,
        dl,
        dt,
        dd,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p {
            margin: 0;
            padding: 0;
        }


        a {
            text-decoration: none;
            color: #333;
        }

        body {
            font-family: Arial, "Microsoft Yahei", "Helvetica Neue", Helvetica, sans-serif;
            font-size: 14px;
            color: #333;
            background: #fafafa
        }

        .content {
            margin: 0px auto;
            overflow: hidden;
            text-align: center;
            position: fixed;
            width: 300px;
            height: 240px;
            left: 50%;
            top: 50%;
            margin-left: -150px;
            margin-top: -120px;
        }

        .notice {
            overflow: hidden;
            font-size: 30px;
            margin-bottom: 60px;
        }

        .notice span {
            font-size: 60px;
            font-weight: 300;
        }

        .btn a {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid #e6e6e6;
            background: #fff;
            font-size: 14px;
            border-radius: 5px;
            box-shadow: 2px 5px 10px rgba(0, 0, 0, .03);
        }

        .btn a:hover {
            color: #08c;
            border-color: #08c;
        }
    </style>
</head>

<body>
    <div class="content">
        <div class="notice">
            <span>404</span>｜页面不存在
        </div>
        <div class="btn">
            <a href="/">返回首页</a>
        </div>
    </div>
</body>

</html>
